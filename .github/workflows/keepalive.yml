name: Keep Alive

on:
  schedule:
    - cron: '27 */2 * * *'   # каждые 2 часа, в 27 минут
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: nudge timestamp"
          git push
